<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EduTrack — School Management System</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0f1f3d;--navy2:#1a2e52;
  --blue:#2563eb;--blue2:#3b82f6;--blue3:#60a5fa;
  --green:#16a34a;--amber:#d97706;--red:#dc2626;--purple:#7c3aed;--teal:#0891b2;--pink:#db2777;
  --bg:#f0f4f8;--surface:#fff;--border:#e2e8f0;
  --text:#1e293b;--text2:#64748b;--text3:#94a3b8;
  --sidebar:224px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:14px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar);background:var(--navy);display:flex;flex-direction:column;flex-shrink:0}
.logo{padding:18px 16px 14px;display:flex;align-items:center;gap:10px;border-bottom:1px solid rgba(255,255,255,.08)}
.logo i{font-size:24px;color:var(--blue3)}
.logo-text{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:10px;color:rgba(255,255,255,.35);letter-spacing:.5px;text-transform:uppercase}
.role-switch{margin:12px 12px 4px;display:flex;background:rgba(255,255,255,.07);border-radius:8px;padding:3px;gap:2px;flex-wrap:wrap}
.role-btn{flex:1;border:none;background:transparent;color:rgba(255,255,255,.5);font-size:10px;padding:5px 4px;cursor:pointer;border-radius:6px;transition:.15s;font-weight:500;min-width:40px}
.role-btn.active{background:rgba(255,255,255,.15);color:#fff}
.nav-section{padding:8px 0 2px;font-size:9px;font-weight:700;color:rgba(255,255,255,.25);letter-spacing:1.5px;text-transform:uppercase;padding-left:16px;margin-top:6px}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 16px;color:rgba(255,255,255,.55);font-size:13px;cursor:pointer;border-left:3px solid transparent;transition:.15s;user-select:none}
.nav-item:hover{color:rgba(255,255,255,.9);background:rgba(255,255,255,.06)}
.nav-item.active{color:#fff;background:rgba(255,255,255,.1);border-left-color:var(--blue3)}
.nav-item i{font-size:17px;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:99px;font-size:9px;padding:1px 6px;font-weight:700}
.sidebar-user{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px;margin-top:auto}
.ava{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;background:var(--blue)}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);height:54px;padding:0 22px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:17px;font-weight:700;color:var(--text)}
.topbar-r{display:flex;align-items:center;gap:6px}
.icon-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text2);transition:.15s;position:relative}
.icon-btn:hover{background:var(--bg)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--red);border:2px solid var(--surface)}
.content{flex:1;overflow-y:auto;padding:22px}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px}
.modal{background:var(--surface);border-radius:14px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal-header{padding:20px 22px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:var(--surface);z-index:1}
.modal-title{font-size:16px;font-weight:700}
.modal-body{padding:20px 22px}
.modal-footer{padding:14px 22px;border-top:1px solid var(--border);display:flex;justify-content:flex-end;gap:8px}

/* TOAST */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{background:var(--text);color:#fff;padding:12px 18px;border-radius:10px;font-size:13px;font-weight:500;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.25);animation:slideIn .2s ease;max-width:320px}
.toast.success{background:#166534;border:1px solid #4ade80}
.toast.error{background:#991b1b;border:1px solid #f87171}
.toast.info{background:#1e40af;border:1px solid #93c5fd}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}

/* CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px}
.stat-icon{font-size:20px;margin-bottom:8px}
.stat-label{font-size:11px;color:var(--text2);font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:4px}
.stat-val{font-size:26px;font-weight:800;color:var(--text);line-height:1}
.stat-sub{font-size:11px;color:var(--text3);margin-top:4px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:16px}
.card:last-child{margin-bottom:0}
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.card-title{font-size:14px;font-weight:700;color:var(--text)}

/* BUTTONS */
.btn{border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-size:13px;padding:7px 14px;color:var(--text);display:inline-flex;align-items:center;gap:6px;transition:.15s;font-weight:500}
.btn:hover{background:var(--bg)}
.btn-primary{background:var(--blue);color:#fff;border-color:var(--blue)}
.btn-primary:hover{background:#1d4ed8}
.btn-success{background:var(--green);color:#fff;border-color:var(--green)}
.btn-danger{background:var(--red);color:#fff;border-color:var(--red)}
.btn-sm{font-size:12px;padding:5px 10px}
.btn-xs{font-size:11px;padding:3px 8px;border-radius:6px}
.btn-icon{width:30px;height:30px;padding:0;justify-content:center;border-radius:6px}

/* PILLS */
.pill{display:inline-flex;align-items:center;gap:3px;font-size:11px;padding:3px 9px;border-radius:99px;font-weight:600;white-space:nowrap}
.pill-green{background:#dcfce7;color:#166534}.pill-red{background:#fee2e2;color:#991b1b}
.pill-amber{background:#fef3c7;color:#92400e}.pill-blue{background:#dbeafe;color:#1e40af}
.pill-purple{background:#ede9fe;color:#5b21b6}.pill-teal{background:#ccfbf1;color:#065f46}
.pill-gray{background:#f1f5f9;color:#475569}.pill-pink{background:#fce7f3;color:#9d174d}

/* TABLES */
.table-wrap{overflow-x:auto;border-radius:8px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse}
th{text-align:left;font-size:11px;font-weight:700;color:var(--text2);padding:10px 12px;border-bottom:2px solid var(--border);background:#f8fafc;text-transform:uppercase;letter-spacing:.4px;white-space:nowrap}
td{padding:11px 12px;border-bottom:1px solid var(--border);color:var(--text);font-size:13px}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f8fafc}

/* FORMS */
.input,.select,.textarea{width:100%;border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;background:var(--surface);color:var(--text);transition:.15s;font-family:inherit}
.input:focus,.select:focus,.textarea:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
.textarea{resize:vertical;min-height:80px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:5px;margin-bottom:12px}
.form-label{font-size:12px;font-weight:600;color:var(--text2)}
.form-help{font-size:11px;color:var(--text3)}

/* MISC */
.bar-wrap{background:#e2e8f0;border-radius:99px;height:7px;overflow:hidden}
.bar{height:100%;border-radius:99px}
.grade-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--border)}
.grade-row:last-child{border-bottom:none}
.hw-item{display:flex;align-items:flex-start;gap:12px;padding:11px 0;border-bottom:1px solid var(--border)}
.hw-item:last-child{border-bottom:none}
.hw-check{width:20px;height:20px;border:2px solid var(--border);border-radius:5px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:.15s}
.hw-check.done{background:var(--green);border-color:var(--green);color:#fff}
.divider{border:none;border-top:1px solid var(--border);margin:14px 0}
.notice{border-radius:8px;padding:10px 14px;font-size:13px;display:flex;align-items:center;gap:8px;margin-bottom:14px}
.notice.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af}
.notice.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e}
.notice.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534}
.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state i{font-size:40px;opacity:.25;display:block;margin-bottom:10px}
.search-bar{display:flex;gap:8px;margin-bottom:16px;align-items:center;flex-wrap:wrap}
.search-bar .input{max-width:260px}

/* BADGE AVATAR */
.big-ava{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;color:#fff;flex-shrink:0}

/* ATTENDANCE CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;text-align:center}
.cal-day-name{font-size:10px;font-weight:700;color:var(--text2);padding:4px 0;text-transform:uppercase}
.cal-day{border-radius:7px;padding:7px 0;font-size:12px;font-weight:600}
.cal-p{background:#dcfce7;color:#166534}.cal-a{background:#fee2e2;color:#991b1b}
.cal-l{background:#fef3c7;color:#92400e}.cal-empty{background:transparent}

/* SCHEDULE */
.sch-grid{display:grid;grid-template-columns:58px repeat(5,1fr);gap:0;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sch-hdr{background:var(--navy);color:#fff;padding:10px 6px;font-size:11px;font-weight:700;text-align:center}
.sch-time{background:#f8fafc;padding:8px 4px;font-size:10px;color:var(--text2);text-align:center;border-right:1px solid var(--border);border-bottom:1px solid var(--border);font-weight:600}
.sch-cell{border-right:1px solid var(--border);border-bottom:1px solid var(--border);padding:4px;min-height:52px;background:var(--surface)}
.sch-cls{border-radius:6px;padding:5px 7px;font-size:11px;font-weight:600;height:100%;display:flex;flex-direction:column;justify-content:center}

/* MSG */
.msg-layout{display:grid;grid-template-columns:240px 1fr;height:460px;border:1px solid var(--border);border-radius:12px;overflow:hidden}
.msg-list{border-right:1px solid var(--border);overflow-y:auto;background:var(--surface)}
.msg-item{padding:12px 14px;cursor:pointer;border-bottom:1px solid var(--border);display:flex;gap:10px;transition:.15s}
.msg-item:hover,.msg-item.active{background:#f0f4ff}
.bubble-wrap{display:flex;gap:8px;align-items:flex-end}
.bubble-wrap.me{flex-direction:row-reverse}
.bubble{max-width:65%;padding:10px 14px;border-radius:16px;font-size:13px;line-height:1.5}
.bubble-in{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.bubble-me{background:var(--blue);color:#fff;border-bottom-right-radius:4px}
</style>
</head>

// ── Core Helpers ──────────────────────────────────────────────────
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.innerHTML = `<i class="ti ${type==='success'?'ti-check':type==='error'?'ti-x':'ti-info-circle'}"></i>${msg}`;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

function showModal(html, onClose) {
  const mr = document.getElementById('modal-root');
  mr.innerHTML = `<div class="modal-overlay" id="modal-overlay" onclick="e=>{if(e.target.id==='modal-overlay')closeModal()}">${html}</div>`;
  document.getElementById('modal-overlay').onclick = e => { if(e.target.id==='modal-overlay') closeModal(); };
}

function closeModal() {
  document.getElementById('modal-root').innerHTML = '';
}

function setRole(r) {
  role = r;
  document.querySelectorAll('.role-btn').forEach((b,i) => b.classList.toggle('active',['student','teacher','admin','parent'][i]===r));
  const u = ROLES_CFG[r];
  document.getElementById('uname').textContent = u.name;
  document.getElementById('urole').textContent = u.role;
  document.getElementById('ava').textContent = u.ava;
  document.getElementById('ava').style.background = u.color;
  navigate('dash');
}

function navigate(p) {
  page = p;
  renderNav();
  const titles = {dash:'Dashboard','admin-students':'Manage Students','admin-teachers':'Manage Teachers','admin-classes':'Manage Classes','admin-analytics':'Analytics',attendance:role==='teacher'?'Attendance':'My Attendance',grades:role==='teacher'?'Grade Book':'My Grades',homework:role==='teacher'?'Assignments':'Homework',schedule:'Weekly Schedule',messages:'Messages',notifications:'Notifications',reports:'Reports',settings:'Settings'};
  document.getElementById('ptitle').textContent = titles[p] || p;
  const fn = allPages[p];
  document.getElementById('content').innerHTML = fn ? fn() : `<div class="empty-state"><i class="ti ti-tool"></i><p>Coming soon</p></div>`;
  bindAll();
}

function renderNav() {
  const u = ROLES_CFG[role];
  document.getElementById('nav').innerHTML = u.nav.map(sec => `
    <div class="nav-section">${sec.s}</div>
    ${sec.items.map(n=>`<div class="nav-item${n.id===page?' active':''}" onclick="navigate('${n.id}')">
      <i class="ti ${n.i}"></i>${n.l}${n.badge?`<span class="nav-badge">${n.badge}</span>`:''}
    </div>`).join('')}`).join('');
}

function initials(name) { return name.split(' ').map(x=>x[0]).join('').toUpperCase(); }
function gpaColor(g) { return g>=3.5?'#16a34a':g>=2.5?'#2563eb':g>=2?'#d97706':'#dc2626'; }
function statusPill(s) { return s==='active'?'pill-green':'pill-red'; }

function bindAll() {
  document.querySelectorAll('.hw-check').forEach((el,i) => {
    el.onclick = () => { hwState[i]=!hwState[i]; el.classList.toggle('done',hwState[i]); el.innerHTML=hwState[i]?'<i class="ti ti-check"></i>':''; };
  });
}

function saveStudent(id) {
  const name=document.getElementById('f-name').value.trim();
  const email=document.getElementById('f-email').value.trim();
  const grade=document.getElementById('f-grade').value;
  const phone=document.getElementById('f-phone').value.trim();
  const status=document.getElementById('f-status').value;
  if (!name||!email) { toast('Name and email are required','error'); return; }
  if (id) {
    const idx = studentsDB.findIndex(s=>s.id===id);
    studentsDB[idx] = {...studentsDB[idx],name,email,grade,phone,status};
    toast('Student updated successfully','success');
  } else {
    if (studentsDB.find(s=>s.email===email)) { toast('Email already exists','error'); return; }
    studentsDB.push({id:Date.now(),name,email,grade,phone,status,gpa:0,att:'P',joined:new Date().toISOString().split('T')[0]});
    toast('Student added successfully','success');
  }
  closeModal(); navigate('admin-students');
}

function deleteStudent(id) {
  if (!confirm('Are you sure you want to remove this student? This cannot be undone.')) return;
  studentsDB = studentsDB.filter(s=>s.id!==id);
  toast('Student removed','success'); navigate('admin-students');
}

function toggleStudentStatus(id) {
  const s = studentsDB.find(s=>s.id===id);
  s.status = s.status==='active'?'inactive':'active';
  toast(`Student ${s.status==='active'?'activated':'deactivated'}`,'success'); navigate('admin-students');
}

schedule() {

  const cls=[
    {s:'Mathematics',c:'#2563eb',d:0,p:0},{s:'Science',c:'#16a34a',d:0,p:2},{s:'Lunch',c:'#94a3b8',d:0,p:4,lunch:true},

  ];
  cls.forEach(c=>grid[c.p][c.d]=c);
  return `<div class="sch-grid">
    <div class="sch-hdr">Time</div>${days.map(d=>`<div class="sch-hdr">${d}</div>`).join('')}

      return `<div class="sch-cell"><div class="sch-cls" style="background:${c.c}15;border-left:3px solid ${c.c}"><div style="font-size:11px;font-weight:700;color:${c.c}">${c.s}</div></div></div>`;

},

        const letter=avg>=90?'A':avg>=80?'B':avg>=70?'C':avg>=60?'D':'F';
        const c=avg>=90?'#16a34a':avg>=80?'#2563eb':avg>=70?'#d97706':'#dc2626';
        return `<tr><td style="font-weight:700">${s.name}</td>${scores.map(q=>`<td><input class="input" value="${q}" style="width:55px;text-align:center;padding:4px;font-size:12px"></td>`).join('')}<td style="font-weight:700;color:${c}">${avg}</td><td><span class="pill" style="background:${c}20;color:${c}">${letter}</span></td></tr>`;
      }).join('')}
    </tbody></table></div>
  </div>`;
}
